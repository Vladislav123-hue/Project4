<!DOCTYPE html>
<html>
<head>
    <title>Категории</title>
</head>
<body>
    <h1>Список категорий</h1>
    <ul>
        {% for category in categories %}
            <li>{{ category.name }}</li>
        {% empty %}
            <li>Категории не найдены.</li>
        {% endfor %}
    </ul>
</body>
</html>
